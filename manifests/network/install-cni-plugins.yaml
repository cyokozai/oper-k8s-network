apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: install-cni-plugins
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: install-cni-plugins
  template:
    metadata:
      labels:
        app: install-cni-plugins
    spec:
      hostNetwork: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: install-bridge
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              # arm64 (aarch64) binary
              wget -qO /tmp/cni.tgz \
                https://github.com/containernetworking/plugins/releases/download/v1.4.1/cni-plugins-linux-arm64-v1.4.1.tgz
              tar xz -C /host/opt/cni/bin -f /tmp/cni.tgz ./bridge ./host-local
              echo "bridge installed: $(ls -la /host/opt/cni/bin/bridge)"
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
