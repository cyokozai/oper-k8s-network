apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: openperouter
  namespace: openperouter-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "openperouter",
      "type": "bridge",
      "bridge": "openbr0",
      "isDefaultGateway": false,
      "ipam": {
        "type": "host-local",
        "subnet": "10.100.0.0/24",
        "rangeStart": "10.100.0.10",
        "rangeEnd": "10.100.0.99"
      }
    }
