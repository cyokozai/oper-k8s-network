name: openperouter-lab

topology:
  nodes:
    tor:
      kind: linux
      image: quay.io/frrouting/frr:10.2.1
      binds:
        # frr.conf に BGP 設定を記述し、起動時に bgpd が読み込む
        - configs/tor/frr.conf:/etc/frr/frr.conf
        - configs/tor/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        # net1 の IP は scripts/connect-tor.sh で付与される
        - "ip addr add 172.16.1.1/24 dev eth1"
        - "ip addr add 172.16.2.1/24 dev eth2"

    client-a:
      kind: linux
      image: alpine:3.19
      exec:
        - "ip addr add 172.16.1.2/24 dev eth1"
        - "ip route add default via 172.16.1.1"

    client-b:
      kind: linux
      image: alpine:3.19
      exec:
        - "ip addr add 172.16.2.2/24 dev eth1"
        - "ip route add default via 172.16.2.1"

  links:
    - endpoints: ["tor:eth1", "client-a:eth1"]
    - endpoints: ["tor:eth2", "client-b:eth1"]
