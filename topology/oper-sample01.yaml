apiVersion: clabernetes.containerlab.dev/v1alpha1
kind: Topology
metadata:
  name: openperouter-lab
  namespace: c9s
spec:
  # extraAnnotations attaches multus NAD to the launcher Pod so net1 is injected by multus
  nodeAliases:
    tor:
      extraAnnotations:
        k8s.v1.cni.cncf.io/networks: openperouter-system/openperouter
  definition:
    containerlab: |
      name: openperouter-lab
      topology:
        nodes:
          tor:
            kind: linux
            image: quay.io/frrouting/frr:10.2.1
            # Attach tor to the openperouter bridge (net1) for BGP peering with PE routers
            annotations:
              k8s.v1.cni.cncf.io/networks: openperouter-system/openperouter
            exec:
              # Assign static IP on the underlay bridge interface (net1)
              - "ip addr add 10.100.0.100/24 dev net1 || true"
              # Assign IPs on CE-facing interfaces
              - "ip addr add 172.16.1.1/24 dev eth1 || true"
              - "ip addr add 172.16.2.1/24 dev eth2 || true"
              # Configure FRR BGP: CE ASN 64512, listen for PE routers from 10.100.0.0/24
              - >-
                vtysh
                -c 'configure terminal'
                -c 'router bgp 64512'
                -c ' bgp router-id 10.100.0.100'
                -c ' bgp listen range 10.100.0.0/24 peer-group OPENPEROUTER'
                -c ' neighbor OPENPEROUTER peer-group'
                -c ' neighbor OPENPEROUTER remote-as 64514'
                -c ' address-family ipv4 unicast'
                -c '  neighbor OPENPEROUTER activate'
                -c '  network 172.16.1.0/24'
                -c '  network 172.16.2.0/24'
                -c ' exit-address-family'
                -c ' end'
                -c 'write memory'
          client-a:
            kind: linux
            image: alpine:3.19
            exec:
              - "ip addr add 172.16.1.2/24 dev eth1 || true"
              - "ip route add default via 172.16.1.1 || true"
          client-b:
            kind: linux
            image: alpine:3.19
            exec:
              - "ip addr add 172.16.2.2/24 dev eth1 || true"
              - "ip route add default via 172.16.2.1 || true"
        links:
          - endpoints: ["tor:eth1", "client-a:eth1"]
          - endpoints: ["tor:eth2", "client-b:eth1"]
